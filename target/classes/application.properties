
spring.application.name=demo
# Servidor
server.port=8080
spring.web.error.include-message=always

# ============================================
# Base de datos local (PostgreSQL + PostGIS)
# ============================================
# Por defecto en entorno local apuntamos al contenedor Docker PostGIS definido
spring.datasource.url=jdbc:postgresql://localhost:5433/redpatitas_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=redpatitas
spring.datasource.password=redpatitas_pass

# Si quieres usar H2 en memoria para pruebas rápidas, descomenta las líneas siguientes
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# JPA y Hibernate
# Flyway crea el esquema; Hibernate solo valida la estructura contra las entidades
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
# Dejar que Hibernate autodetecte el dialecto (evita clase de dialecto específica que puede faltar)
# spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ============================================
# Azure Blob Storage
# ============================================
# Modo de almacenamiento: local o azure
storage.mode=local

# URL pública base usada para construir las URLs cuando storage.mode=local
# Ejemplo: http://localhost:8081/uploads
storage.public-url=http://localhost:8081/uploads

# Azure desactivado en modo local. Cuando implementes Azure, cambia storage.mode=azure
# y completa estos valores reales.
# Conexión (puedes usar cadena de conexión o usar DefaultAzureCredential)
# azure.storage.connection-string=DefaultEndpointsProtocol=https;AccountName=tu_cuenta;AccountKey=tu_clave;EndpointSuffix=core.windows.net
# azure.storage.container-name=pets-images
# azure.storage.thumbnail-container-name=pets-thumbnails

# ============================================
# JWT
# ============================================
app.jwt.secret=MiClaveSecretaJWTQueDebeSerLargaYSeguraAlMenos32Caracteres
# 24 horas
app.jwt.expiration.ms=86400000

# URL base del servicio de autenticación (para obtener contacto público)
# app.auth.base-url=http://localhost:8081

# ============================================
# Email (notificaciones)
# ============================================
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=tu_correo@gmail.com
# spring.mail.password=tu_contraseña_app
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================
# Configuración de imágenes (tamaño máximo después de redimensionar)
# ============================================
image.max-size-bytes=4194304  
image.thumbnail.width=200
image.thumbnail.height=200

# ============================================
# Swagger/OpenAPI
# ============================================
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operations-sorter=method

# ============================================
# Modo local de pruebas (sin login)
# ============================================
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration